name: Banking Agent Evaluation Suite

goals:
  - name: Account Balance Inquiry
    description: Customer wants to check the balance on one or more of their accounts
    criteria: >
      The agent successfully provides the customer with their account balance.
      SUCCESS: The agent displays or states a specific dollar amount for at least
      one account (checking, savings, credit, etc.).
      FAILURE: The agent fails to provide a balance, gets stuck in a verification
      loop, or the conversation ends without the customer receiving balance information.

  - name: Bill Payment
    description: Customer wants to pay a bill (electricity, water, internet, etc.)
    criteria: >
      The agent successfully processes or confirms a bill payment.
      SUCCESS: The agent confirms the payment has been processed, provides a
      transaction reference, or confirms the payment details (amount, provider, account).
      FAILURE: The agent fails to complete the payment, gets stuck asking for
      information repeatedly, or the conversation ends without payment confirmation.

  - name: Appointment Booking
    description: Customer wants to schedule an appointment
    criteria: >
      The agent successfully books an appointment with a confirmed date and time.
      SUCCESS: The agent confirms a specific appointment date, time, and any
      relevant details (location, purpose).
      FAILURE: The agent fails to confirm an appointment, or the conversation
      ends without a booking confirmation.

  - name: Password Reset
    description: Customer wants to reset their account password
    criteria: >
      The agent successfully initiates a password reset for the customer.
      SUCCESS: The agent confirms a reset link has been sent, a temporary
      password has been issued, or the password has been changed.
      FAILURE: The agent fails to initiate the reset, or the conversation
      ends without confirmation that the password process has started.

  - name: Fund Transfer
    description: Customer wants to transfer money between accounts
    criteria: >
      The agent successfully processes a fund transfer between accounts.
      SUCCESS: The agent confirms the transfer with details (amount, source
      account, destination account) or provides a confirmation number.
      FAILURE: The agent fails to complete the transfer, or the conversation
      ends without transfer confirmation.
