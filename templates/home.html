<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GC Chat Log Evaluator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            background: #f5f5f5;
            color: #333;
        }
        h1 {
            color: #1a1a2e;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #666;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }
        .label-hint {
            font-weight: normal;
            font-size: 0.85rem;
            color: #666;
        }
        input[type="text"],
        input[type="file"] {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #4a90d9;
            box-shadow: 0 0 0 2px rgba(74, 144, 217, 0.2);
        }
        .btn-submit {
            background: #4a90d9;
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-submit:hover {
            background: #357abd;
        }
        .errors {
            background: #fee;
            border: 1px solid #fcc;
            border-radius: 4px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
        .errors ul {
            margin: 0;
            padding-left: 1.2rem;
        }
        .errors li {
            color: #c00;
        }
        .section-header {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1a1a2e;
            margin-top: 1.5rem;
            margin-bottom: 0.8rem;
            padding-bottom: 0.3rem;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <h1>GC Chat Log Evaluator</h1>
    <p class="subtitle">Upload a chat log and evaluation suite to evaluate conversations against defined goals using an LLM judge.</p>

    {% if errors %}
    <div class="errors">
        <ul>
            {% for error in errors %}
            <li>{{ error }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}

    <form method="POST" action="/run" enctype="multipart/form-data" id="run-form">
        <div class="section-header">Input Files</div>

        <div class="form-group">
            <label for="chat_log_file">Chat Log File <span class="label-hint">(JSON or CSV)</span></label>
            <input type="file" id="chat_log_file" name="chat_log_file"
                   accept=".json,.csv">
        </div>

        <div class="form-group">
            <label for="evaluation_suite_file">Evaluation Suite File <span class="label-hint">(JSON or YAML)</span></label>
            <input type="file" id="evaluation_suite_file" name="evaluation_suite_file"
                   accept=".json,.yaml,.yml">
        </div>

        <div class="section-header">Ollama Configuration</div>

        <div class="form-group">
            <label for="ollama_model">Ollama Model</label>
            <input type="text" id="ollama_model" name="ollama_model"
                   value="{{ config.ollama_model or '' }}"
                   placeholder="e.g., llama3">
        </div>

        <div class="form-group">
            <label for="ollama_url">Ollama URL</label>
            <input type="text" id="ollama_url" name="ollama_url"
                   value="{{ config.ollama_base_url or 'http://localhost:11434' }}"
                   placeholder="http://localhost:11434">
        </div>

        <div class="form-group">
            <label for="timeout">LLM Timeout (seconds)</label>
            <input type="text" id="timeout" name="timeout"
                   value="{{ config.llm_timeout or '120' }}"
                   placeholder="120">
        </div>

        <button type="submit" class="btn-submit">Run Evaluation</button>
    </form>
</body>
</html>
